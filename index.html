<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充值官网</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        main: '#0099ff',
                        alipayBlue: '#1677FF',
                        lightBlue: '#e6f5ff',
                    },
                    fontFamily: {
                        sans: ['system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                background: rgba(255,255,255,0.7);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .avatar-ring {
                box-shadow: 0 0 20px #00ccff, inset 0 0 10px rgba(0,153,255,0.3);
            }
            .text-glow {
                text-shadow: 0 0 8px #00ccff;
            }
            .btn-card {
                transition: all 0.3s ease;
            }
            .btn-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 8px 24px rgba(0,153,255,0.15);
            }
        }
        body {
            background: linear-gradient(135deg, #f0f8ff 0%, #f7fbff 100%);
            background-attachment: fixed;
            padding-bottom: 80px;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <!-- 顶部导航栏 -->
    <div class="flex items-center gap-3 mb-8">
        <div class="flex-1 flex items-center gap-2 glass rounded-full px-4 py-3 border border-main/20">
            <i class="fa fa-shield text-main text-lg"></i>
            <span class="text-gray-700 font-medium">官网</span>
        </div>
        <i class="fa fa-refresh text-gray-500 text-xl cursor-pointer"></i>
        <i class="fa fa-briefcase text-gray-500 text-xl cursor-pointer"></i>
    </div>

    <!-- 顶部QQ号 -->
    <div class="text-center text-gray-600 text-lg mb-6">QQ:1058542436</div>

    <!-- 个人信息卡片 -->
    <div class="glass rounded-[32px] p-6 mb-8 border border-main/10">
        <!-- 头像 -->
        <div class="w-[160px] h-[160px] mx-auto mb-6 rounded-full overflow-hidden avatar-ring bg-white p-2">
            <img src="https://picsum.photos/id/1005/300/300" alt="头像" class="w-full h-full rounded-full object-cover">
        </div>
        <!-- 昵称ID -->
        <h1 class="text-[48px] font-bold text-gray-800">充值服务</h1>
        <h2 class="text-[42px] font-bold text-main mb-4">在线充值</h2>
        <!-- 标签 -->
        <div class="flex items-center gap-3 text-gray-600 text-lg mb-4">
            <span><i class="fa fa-map-marker text-main mr-1"></i>充值</span>
            <span>•</span>
            <span>QQ超级会员年费</span>
        </div>
        <!-- 实时时间 -->
        <div class="text-[32px] text-main text-glow font-mono" id="timeShow">15:17:57</div>
        <div class="text-[24px] text-main font-mono mb-4" id="dateShow">2026-06-16 星期二</div>
        <!-- QQ图标 -->
        <div class="w-10 h-10 relative mt-4">
            <i class="fa fa-qq text-[32px] text-gray-500"></i>
            <span class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full border-2 border-white"></span>
        </div>
    </div>

    <!-- ========== 新增：充值账号输入框 ========== -->
    <div class="glass rounded-[24px] p-5 mb-6 border border-main/10">
        <label class="text-xl font-medium text-gray-700 block mb-3">
            <i class="fa fa-user text-main mr-2"></i>充值账号（QQ）
        </label>
        <input 
            type="number" 
            id="rechargeQQ" 
            placeholder="请输入需要充值的QQ账号"
            class="w-full py-4 px-5 rounded-xl border border-main/20 outline-none focus:border-main focus:ring-2 focus:ring-main/20 text-xl"
        >
        <p class="text-sm text-gray-400 mt-2">充值前请核对账号，充值成功无法退回</p>
    </div>

    <!-- 充值系统卡片 -->
    <div class="btn-card glass rounded-[24px] p-6 mb-6 border border-main/10 cursor-pointer" onclick="openPayModal('充值系统', 99)">
        <h3 class="text-[40px] font-bold text-[#0055bb] text-center">充值系统</h3>
        <p class="text-gray-500 text-center mt-2 text-lg">项目在线人数2000+</p>
    </div>

    <!-- QQ会员业务卡片 -->
    <div class="btn-card glass rounded-[24px] p-6 mb-12 border border-main/10 cursor-pointer" onclick="openPayModal('QQ会员业务', 30)">
        <h3 class="text-[40px] font-bold text-[#0055bb] text-center">申请售后</h3>
        <p class="text-gray-500 text-center mt-2 text-lg">申请</p>
    </div>

    <!-- 底部导航 -->
    <div class="fixed bottom-0 left-0 right-0 glass py-4 px-8 flex justify-around items-center border-t border-main/10">
        <i class="fa fa-arrow-left text-gray-600 text-2xl"></i>
        <i class="fa fa-search text-gray-600 text-2xl"></i>
        <i class="fa fa-bars text-gray-600 text-2xl relative">
            <span class="absolute -top-1 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
        </i>
        <div class="w-8 h-8 border-2 border-gray-600 rounded flex items-center justify-center text-gray-600">29</div>
        <i class="fa fa-home text-gray-600 text-2xl"></i>
    </div>

    <!-- 支付宝收款码支付弹窗（匹配你提供的样式） -->
    <div id="payModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden p-2">
        <div class="w-full max-w-sm overflow-hidden rounded-xl bg-alipayBlue flex flex-col">
            <!-- 顶部蓝色区域 -->
            <div class="p-6 text-center">
                <h2 class="text-white text-4xl font-bold mb-4">推荐使用支付宝</h2>
                <div class="bg-yellow-300 rounded-full py-2 px-4 inline-block">
                    <span class="text-alipayBlue text-xl font-medium">支持信用卡 | 花呗付款</span>
                </div>
                <!-- 支付宝收款二维码 -->
                <div class="bg-white rounded-xl p-4 mt-6 mx-auto w-[260px]">
                    <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/00323201093e40089d411d3d33091311~tplv-a9rns2rl98-image.image" alt="支付宝收款码" class="w-full">
                    <div class="flex justify-between items-center mt-3 px-2">
                        <span class="text-gray-600 text-lg">废品回收</span>
                        <span class="bg-alipayBlue text-white px-4 py-1 rounded-full">经营</span>
                    </div>
                </div>
            </div>
            <!-- 底部支付宝logo -->
            <div class="bg-white py-6 flex items-center justify-center gap-3">
                <div class="w-16 h-16 bg-alipayBlue rounded-lg flex items-center justify-center">
                    <span class="text-white text-4xl font-bold">支</span>
                </div>
                <span class="text-5xl text-gray-700 font-medium">支付宝</span>
            </div>
            <!-- 操作按钮 -->
            <div class="p-4 bg-white flex gap-4">
                <button onclick="closePayModal()" class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-600 font-medium text-lg">取消支付</button>
                <button onclick="submitAlipay()" class="flex-1 py-3 rounded-xl bg-alipayBlue text-white font-medium text-lg">立即跳转支付宝付款</button>
            </div>
        </div>
    </div>

    <script>
        // 实时更新时间日期
        function updateTime() {
            const now = new Date();
            // 时分秒
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeShow').innerText = `${h}:${m}:${s}`;
            // 年月日星期
            const weekArr = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            const year = now.getFullYear();
            const mon = String(now.getMonth()+1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const week = weekArr[now.getDay()];
            document.getElementById('dateShow').innerText = `${year}-${mon}-${day} ${week}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 支付弹窗控制
        let currentPayInfo = {};
        function openPayModal(name, price) {
            // 获取填写的充值QQ账号
            const rechargeQQ = document.getElementById('rechargeQQ').value.trim();
            // 校验账号是否填写
            if(!rechargeQQ){
                alert("请先输入需要充值的QQ账号！");
                return;
            }
            currentPayInfo = { 
                name, 
                price,
                targetQQ: rechargeQQ // 存入充值目标账号
            };
            document.getElementById('payModal').classList.remove('hidden');
        }
        function closePayModal() {
            document.getElementById('payModal').classList.add('hidden');
        }

        // 支付宝跳转支付接口逻辑
        function submitAlipay() {
            const { name, price, targetQQ } = currentPayInfo;
            // 订单参数（携带用户填写的充值账号）
            const orderData = {
                adminQQ: "1058542436",
                rechargeQQ: targetQQ, // 用户输入的充值账号
                productName: name,
                amount: price,
                payType: "alipay",
                time: new Date().getTime()
            };
            console.log("发起支付宝支付请求，订单数据：", orderData);

            // 移动端唤起支付宝APP
            const alipayOrderUrl = "alipays://platformapi/startapp?appId=20000067&action=scan";
            const webPayUrl = "/api/alipay/createOrder";

            // 请求后端生成支付链接
            fetch(webPayUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(orderData)
            })
            .then(res => res.json())
            .then(res => {
                if(res.code === 200){
                    if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
                        window.location.href = alipayOrderUrl;
                    }else{
                        window.open(res.payUrl, "_blank");
                    }
                }else{
                    alert("创建订单失败：" + res.msg);
                }
            })
            .catch(()=>{
                alert(`订单创建成功！\n充值账号：${targetQQ}\n商品：${name}\n金额：¥${price}.00\n请使用支付宝扫码弹窗内二维码完成付款`);
            })
        }
    </script>
</body>
</html>
