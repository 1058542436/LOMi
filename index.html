<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 40px 20px;
        }
        .order-box {
            max-width: 520px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .status-header {
            background: #ff9500;
            color: #fff;
            padding: 18px 24px;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }
        .form-wrap {
            padding: 24px;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .order-item:last-child{
            border-bottom: none;
        }
        .label-text {
            color: #666;
        }
        .value-text {
            color: #222;
            font-weight: 500;
        }
        .tip-box{
            margin-top:20px;
            padding:12px;
            background:#fff8e6;
            border-radius:6px;
            color:#d97706;
            font-size:14px;
        }
    </style>
</head>
<body>
    <div class="order-box">
        <div class="status-header">订单状态：待完成</div>
        <div class="form-wrap">
            <div class="order-item">
                <span class="label-text">下单时间</span>
                <span class="value-text">2026-06-18 12:31:00</span>
            </div>
            <div class="order-item">
                <span class="label-text">账号</span>
                <span class="value-text">94993486</span>
            </div>
            <div class="order-item">
                <span class="label-text">充值项目</span>
                <span class="value-text">QQ超级会员 年费</span>
            </div>
            <div class="order-item">
                <span class="label-text">金额</span>
                <span class="value-text">86.00 元</span>
            </div>
            <div class="order-item">
                <span class="label-text">当前订单状态</span>
                <span class="value-text" style="color:#ff9500">待完成</span>
            </div>
            <div class="tip-box">温馨提示：订单正在处理中，请耐心等待，预计30分钟内完成，请勿重复提交。</div>
        </div>
    </div>
</body>
</html>
