<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接口已关闭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000412;
            font-family: "Consolas", monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* 粒子画布 */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* 扫描横线动画 */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            box-shadow: 0 0 8px #00f0ff;
            animation: scan 3s linear infinite;
            z-index: 2;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { top: 100vh; opacity: 0.3; }
        }
        /* 故障文字容器 */
        .error-box {
            z-index: 10;
            text-align: center;
            padding: 40px 60px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(0,240,255,0.05);
            backdrop-filter: blur(6px);
            border-radius: 12px;
        }
        /* 故障霓虹文字 */
        .glitch-text {
            font-size: 48px;
            font-weight: bold;
            color: #00f0ff;
            text-shadow: 
                0 0 5px #00f0ff,
                0 0 10px #00f0ff,
                0 0 20px #0088ff;
            position: relative;
            margin-bottom: 20px;
        }
        .glitch-text::before {
            content: attr(data-text);
            position: absolute;
            left: -3px;
            text-shadow: -2px 0 #ff2255;
            clip: rect(0, 9999px, 0, 0);
            animation: glitch-1 2s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            left: 3px;
            text-shadow: -2px 0 #22ff88;
            clip: rect(0, 9999px, 0, 0);
            animation: glitch-2 3s infinite linear alternate-reverse;
        }
        @keyframes glitch-1 {
            0% { clip: rect(11px, 9999px, 24px, 0); }
            20% { clip: rect(4px, 9999px, 6px, 0); }
            40% { clip: rect(32px, 9999px, 45px, 0); }
            60% { clip: rect(15px, 9999px, 38px, 0); }
            80% { clip: rect(42px, 9999px, 7px, 0); }
            100% { clip: rect(24px, 9999px, 31px, 0); }
        }
        @keyframes glitch-2 {
            0% { clip: rect(4px, 9999px, 19px, 0); }
            20% { clip: rect(22px, 9999px, 3px, 0); }
            40% { clip: rect(12px, 9999px, 29px, 0); }
            60% { clip: rect(35px, 9999px, 11px, 0); }
            80% { clip: rect(8px, 9999px, 41px, 0); }
            100% { clip: rect(30px, 9999px, 16px, 0); }
        }
        /* 小字状态 */
        .sub-text {
            color: #88bccc;
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .code-info {
            color: #ff4466;
            font-size: 22px;
            letter-spacing: 1px;
        }
        /* 底部闪烁提示 */
        .flash-tip {
            margin-top: 30px;
            color: #ffdd00;
            animation: flash 1.2s infinite;
            font-size: 16px;
        }
        @keyframes flash {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <!-- 扫描线 -->
    <div class="scan-line"></div>
    <!-- 粒子背景画布 -->
    <canvas id="particles"></canvas>

    <div class="error-box">
        <div class="glitch-text" data-text="程序员已关闭该接口">程序员已关闭该接口</div>
        <div class="sub-text">API CONNECTION TERMINATED</div>
        <div class="code-info">状态码：503 SERVICE CLOSED</div>
        <div class="flash-tip">▸ 无法发起请求，请稍后重试 ◂</div>
    </div>

    <script>
        // 粒子背景绘制
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.r = Math.random() * 1.5 + 0.3;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.speedY = (Math.random() - 0.5) * 0.8;
                this.opacity = Math.random() * 0.6 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x <0 || this.x>w) this.speedX *= -1;
                if(this.y <0 || this.y>h) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 240, 255, ${this.opacity})`;
                ctx.fill();
            }
        }
        // 生成粒子
        function initParticles(num = 120) {
            particles = [];
            for(let i=0; i<num; i++) particles.push(new Particle());
        }
        initParticles();

        // 连线粒子
        function drawLine(p1,p2) {
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 80) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0,240,255,${0.3 - dist/300})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(p1.x,p1.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.stroke();
            }
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0,0,w,h);
            particles.forEach(p=>{
                p.update();
                p.draw();
            })
            // 互相连线
            for(let i=0; i<particles.length; i++){
                for(let j=i+1; j<particles.length; j++){
                    drawLine(particles[i], particles[j]);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
